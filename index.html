const map = L.map('map',{zoomControl:true}).setView([30.28,120.16],12);
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',
  {subdomains:"1234",maxZoom:18,attribution:'高德地图'}).addTo(map);

const layers={},counts={};
Object.keys(GROUPS).forEach(k=>{layers[k]=L.layerGroup().addTo(map);counts[k]=0;});
SPOTS.forEach(s=>{
  const c=GROUPS[s.g].color;counts[s.g]++;
  const m=L.circleMarker([s.lat,s.lng],{radius:7,color:"#fff",weight:2,fillColor:c,fillOpacity:.95});
  const ft=s.f?'<span class="tg free">刷卡免费</span>':'<span class="tg free">需购票/半价</span>';
  m.bindPopup(`<b>${s.n}</b><div class="addr">📍 ${GROUPS[s.g].name} · ${s.a}</div>`+
    `<div class="desc">${s.d}</div>`+
    `<div class="tags"><span class="tg">${s.t}</span>${ft}</div>`,{maxWidth:280});
  m._spot=s;m.addTo(layers[s.g]);
});

// 定位 + 最近
let meCircle=null,lines=[];
function haversine(a,b,c,d){const R=6371,r=Math.PI/180;const dLat=(c-a)*r,dLng=(d-b)*r;
  const x=Math.sin(dLat/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function fmt(d){return d<1?Math.round(d*1000)+" m":d.toFixed(1)+" km";}
function setMe(lat,lng,fly){
  if(meCircle){map.removeLayer(meCircle);}
  meCircle=L.circleMarker([lat,lng],{radius:9,color:"#fff",weight:3,fillColor:"#1565ff",fillOpacity:1}).addTo(map);
  const ranked=SPOTS.map(s=>({...s,d2:haversine(lat,lng,s.lat,s.lng)})).sort((x,y)=>x.d2-y.d2);
  renderNearby(ranked,lat,lng);
  if(fly)map.setView([lat,lng],13);
}
function renderNearby(ranked,lat,lng){
  const box=document.getElementById('nearby'),list=document.getElementById('nearbyList');
  box.style.display='block';list.innerHTML='';
  lines.forEach(l=>map.removeLayer(l));lines=[];
  ranked.slice(0,10).forEach((s,i)=>{
    const c=GROUPS[s.g].color;const row=document.createElement('div');row.className='row';
    row.innerHTML=`<span class="nd" style="background:${c}"></span>`+
      `<div class="info"><div class="nm">${s.n}</div><div class="sub">${GROUPS[s.g].name} · ${s.t}</div></div>`+
      `<div class="dist">${fmt(s.d2)}</div>`;
    row.onclick=()=>{if(!map.hasLayer(layers[s.g]))map.addLayer(layers[s.g]);
      map.setView([s.lat,s.lng],15);
      layers[s.g].eachLayer(m=>{if(m._spot&&m._spot.n===s.n)m.openPopup();});};
    list.appendChild(row);
    if(i<3)lines.push(L.polyline([[lat,lng],[s.lat,s.lng]],{color:c,weight:2,dashArray:"5,7",opacity:.7}).addTo(map));
  });
}
document.getElementById('locBtn').onclick=()=>{
  if(!navigator.geolocation){alert("浏览器不支持定位,请直接在地图上点你家的位置");return;}
  const b=document.getElementById('locBtn');b.textContent="定位中…";
  navigator.geolocation.getCurrentPosition(
    p=>{setMe(p.coords.latitude,p.coords.longitude,true);b.textContent="📍 重新定位";},
    e=>{b.textContent="📍 定位我的位置";alert("定位失败(可能是电脑/未授权)。请直接在地图上点一下你家的位置 👇");}
  );
};
map.on('click',e=>setMe(e.latlng.lat,e.latlng.lng,false));

// 图例
const legendList=document.getElementById('legendList');
Object.entries(GROUPS).forEach(([k,g])=>{
  const el=document.createElement('div');el.className='item';
  el.innerHTML=`<span class="dot" style="background:${g.color}"></span>${g.name}<span class="cnt">${counts[k]}</span>`;
  el.onclick=()=>{if(map.hasLayer(layers[k])){map.removeLayer(layers[k]);el.classList.add('off');}
    else{map.addLayer(layers[k]);el.classList.remove('off');}};
  legendList.appendChild(el);
});
let allOn=true;
document.getElementById('toggleAll').onclick=()=>{
  allOn=!allOn;
  Object.keys(GROUPS).forEach((k,i)=>{const el=legendList.children[i];
    if(allOn){map.addLayer(layers[k]);el.classList.remove('off');}
    else{map.removeLayer(layers[k]);el.classList.add('off');}});
};
